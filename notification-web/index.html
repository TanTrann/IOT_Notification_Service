<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartFarm — Trung tâm thông báo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #eef3f0; --card: #fff; --text: #1e2a26; --muted: #6b7a74;
      --brand: #1f8a4c; --brand-dark: #176e3c;
      --info: #2d7ff9; --warning: #e8930c; --critical: #e0442e;
      --border: #e2e8e5;
    }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Header ─────────────────────────────── */
    header {
      display: flex; align-items: center; gap: 12px; padding: 14px 22px;
      background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 20;
    }
    header .logo { font-size: 1.5rem; }
    header h1 { font-size: 1.15rem; font-weight: 700; flex: 1; }
    .icon-btn {
      position: relative; background: #f2f6f4; border: 1px solid var(--border); cursor: pointer;
      border-radius: 10px; padding: 8px 12px; font-size: 1rem; display: flex; align-items: center; gap: 7px;
      color: var(--text);
    }
    .icon-btn:hover { background: #e7efe9; }
    .icon-btn .u-label { font-size: .85rem; font-weight: 600; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .badge-count {
      position: absolute; top: -6px; right: -6px; background: var(--critical); color: #fff;
      font-size: .66rem; font-weight: 700; border-radius: 999px; padding: 1px 6px; min-width: 18px; text-align: center;
    }

    /* ── Dropdown chung ─────────────────────── */
    .dropdown {
      position: absolute; top: 60px; right: 18px; width: min(400px, 94vw); z-index: 30;
      background: var(--card); border: 1px solid var(--border); border-radius: 14px;
      box-shadow: 0 12px 40px rgba(0,0,0,.16); overflow: hidden;
    }
    .dropdown[hidden] { display: none; }
    .dd-head {
      display: flex; align-items: center; gap: 8px; padding: 12px 14px; border-bottom: 1px solid var(--border);
    }
    .dd-head h3 { font-size: .95rem; flex: 1; }
    .dd-head button, .btn {
      padding: 6px 11px; background: var(--brand); color: #fff; border: none; border-radius: 7px;
      cursor: pointer; font-size: .8rem; font-weight: 600;
    }
    .dd-head button:hover, .btn:hover { background: var(--brand-dark); }
    .btn.ghost, .dd-head button.ghost { background: transparent; color: var(--brand-dark); border: 1px solid var(--border); }
    .btn.ghost:hover, .dd-head button.ghost:hover { background: #eef4f0; }
    .btn { width: 100%; padding: 10px; margin-top: 6px; }
    .dd-list { max-height: 60vh; overflow-y: auto; padding: 8px; }

    /* ── Item thông báo (trong dropdown) ─────── */
    .noti {
      display: flex; gap: 10px; background: var(--card); border: 1px solid var(--border);
      border-left-width: 4px; border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; cursor: pointer;
    }
    .noti:hover { background: #fafdfb; }
    .noti.sev-info { border-left-color: var(--info); }
    .noti.sev-warning { border-left-color: var(--warning); }
    .noti.sev-critical { border-left-color: var(--critical); }
    .noti .icon { font-size: 1.25rem; line-height: 1.4; }
    .noti .content { flex: 1; min-width: 0; }
    .noti .title { font-size: .9rem; font-weight: 500; display: flex; align-items: center; gap: 6px; }
    .noti.unread .title { font-weight: 700; }
    .noti.unread .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--info); flex-shrink: 0; }
    .noti .body { font-size: .82rem; color: var(--muted); margin-top: 3px; word-wrap: break-word; }
    .noti .meta { font-size: .72rem; color: #98a6a0; margin-top: 5px; }
    .empty { text-align: center; color: var(--muted); padding: 34px 12px; font-size: .88rem; line-height: 1.5; }

    /* ── Form cấu hình (trong dropdown ⚙️) ── */
    .dd-body { padding: 14px; }
    .dd-body label { display: block; font-size: .78rem; color: var(--muted); margin: 8px 0 4px; }
    .dd-body input {
      width: 100%; padding: 9px 11px; border: 1px solid var(--border); border-radius: 8px;
      font-size: .86rem; background: #fafcfb; color: var(--text);
    }
    .user-tag { font-size: .85rem; font-weight: 600; color: var(--brand-dark); background: #d7f0e0; padding: 6px 10px; border-radius: 8px; display: inline-block; }
    .fcm-state { font-size: .76rem; color: var(--muted); margin-top: 10px; }
    .fcm-state.on { color: var(--brand-dark); font-weight: 600; }

    /* ── Hero: thông báo gần đây (giữa trang) ── */
    main { max-width: 720px; margin: 0 auto; padding: 40px 20px; }
    .section-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .section-label { font-size: .8rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .8px; }
    .btn-refresh {
      background: var(--card); border: 1px solid var(--border); color: var(--brand-dark);
      border-radius: 8px; padding: 6px 12px; font-size: .8rem; font-weight: 600; cursor: pointer;
    }
    .btn-refresh:hover { background: #eef4f0; }
    #recent-mini { margin-top: 14px; display: flex; flex-direction: column; gap: 10px; }
    #recent-mini .noti { margin-bottom: 0; border-radius: 12px; }
    #hero {
      background: var(--card); border: 1px solid var(--border); border-left: 6px solid var(--muted);
      border-radius: 20px; padding: 32px 30px; box-shadow: 0 6px 24px rgba(0,0,0,.05);
    }
    #hero.sev-info { border-left-color: var(--info); }
    #hero.sev-warning { border-left-color: var(--warning); }
    #hero.sev-critical { border-left-color: var(--critical); }
    #hero .head { display: flex; gap: 20px; align-items: center; }
    #hero .h-icon { font-size: 3.2rem; line-height: 1; }
    #hero .h-title { font-size: 1.5rem; font-weight: 700; line-height: 1.3; }
    #hero .h-body { font-size: 1.05rem; color: var(--muted); margin-top: 8px; line-height: 1.5; white-space: pre-wrap; }
    #hero .h-meta { font-size: .82rem; color: var(--muted); margin-top: 14px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .sev-badge { font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; padding: 3px 9px; border-radius: 6px; color: #fff; }
    #hero.empty-hero { border-left-color: var(--border); text-align: center; color: var(--muted); }
    @keyframes flash { 0% { transform: scale(.99); filter: brightness(1.3); } 100% { transform: none; filter: none; } }
    #hero.flash { animation: flash .5s ease; }

    /* ── Toast ─────────────────────────────── */
    #toast-zone { position: fixed; bottom: 20px; right: 20px; z-index: 99; display: flex; flex-direction: column; gap: 10px; }
    .toast { background: var(--text); color: #fff; border-radius: 10px; padding: 12px 16px; max-width: 320px; box-shadow: 0 6px 24px rgba(0,0,0,.25); font-size: .85rem; animation: slidein .25s ease; }
    .toast b { display: block; margin-bottom: 2px; }
    @keyframes slidein { from { transform: translateX(30px); opacity: 0; } to { transform: none; opacity: 1; } }
    code { background: #eef4f0; padding: 1px 5px; border-radius: 4px; font-size: .9em; }
  </style>
</head>
<body>
  <header>
    <span class="logo">🌱</span>
    <h1>SmartFarm</h1>
    <button class="icon-btn" id="bell-btn" title="Thông báo">
      🔔<span class="badge-count" id="unread-badge" hidden>0</span>
    </button>
    <button class="icon-btn" id="user-btn" title="Cấu hình">
      ⚙️<span class="u-label" id="user-label">Cấu hình</span>
    </button>
  </header>

  <!-- Dropdown: danh sách thông báo -->
  <div class="dropdown" id="bell-dropdown" hidden>
    <div class="dd-head">
      <h3>Thông báo</h3>
      <button class="ghost" onclick="markAllReadLive()">✓ Đọc tất cả</button>
    </div>
    <div class="dd-list" id="dropdown-list"></div>
  </div>

  <!-- Dropdown: cấu hình màn hình kiosk (server + deviceId + API key) -->
  <div class="dropdown" id="user-dropdown" hidden>
    <div class="dd-body" id="user-body"><!-- render form cấu hình --></div>
  </div>

  <!-- Giữa trang: thông báo gần đây nhất + 2 tin nhỏ bên dưới -->
  <main>
    <div class="section-row">
      <span class="section-label">Thông báo gần đây</span>
      <button class="btn-refresh" onclick="loadHistory()">↻ Làm mới</button>
    </div>
    <div id="hero" class="empty-hero">
      <div class="head" style="justify-content:center">
        <div>
          <div class="h-title">Chưa có thông báo</div>
          <div class="h-body">Thông báo mới sẽ hiện ở đây theo thời gian thực.</div>
        </div>
      </div>
    </div>
    <div id="recent-mini"></div>
  </main>

  <div id="toast-zone"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js"></script>
<script>
// ── Firebase project config (khớp firebase-messaging-sw.js) ────────────────
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCUaUnwE20Gi9V35CX9CkcDmqwwxFYZiNI",
  authDomain: "smartfarmai-f1426.firebaseapp.com",
  projectId: "smartfarmai-f1426",
  messagingSenderId: "1071313553757",
  appId: "1:1071313553757:web:d9ad58188bcde720ca80b4",
};
const VAPID_KEY = "BNOC91dgjosxTi-sHV8HaeTx3jKUAUwVAvyWY4tMc_zbMuoMmad0r1h3Rodl92k2bM_E6y4OmHiLP9jSsJ26G6Q";

const TYPE_ICON = { water: '💧', light: '💡', temperature: '🌡️', temp: '🌡️', nutrition: '🌱', disease: '🦠', system: '⚙️', alert: '⚠️' };
const SEV_COLOR = { info: '#2d7ff9', warning: '#e8930c', critical: '#e0442e' };
const SEV_LABEL = { critical: 'Nguy cấp', warning: 'Cảnh báo', info: 'Thông tin' };

// Cấu hình kiosk: { server, deviceId, apiKey }. deviceId = cây/thiết bị màn hình này đứng cạnh.
// Không còn user/đăng nhập — màn hình chỉ nhận & hiển thị thông báo của đúng deviceId đã cấu hình.
let messaging = null;
const cfg = JSON.parse(localStorage.getItem('notiweb-config') || '{}');

function $(id) { return document.getElementById(id); }
function serverUrl() { return (cfg.server || 'http://localhost:3001').replace(/\/$/, ''); }
function ready() { return !!(cfg.server && cfg.deviceId && cfg.apiKey); }

// REST đọc lịch sử — auth bằng API key (x-api-key), tự gắn ?deviceId của kiosk.
function api(path, opts = {}) {
  const sep = path.includes('?') ? '&' : '?';
  const url = `${serverUrl()}/api/v1/notifications${path}${sep}deviceId=${encodeURIComponent(cfg.deviceId || '')}`;
  return fetch(url, {
    ...opts,
    headers: { 'Content-Type': 'application/json', 'x-api-key': cfg.apiKey || '', ...(opts.headers || {}) },
  }).then(async r => {
    const json = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(json.message || `HTTP ${r.status}`);
    return json;
  });
}

function esc(s) { const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; }
function normSev(raw) {
  const s = String(raw ?? '').toLowerCase();
  if (['critical', 'crit', 'error', 'danger', 'high', 'nguy cấp'].some(x => s.includes(x))) return 'critical';
  if (['warning', 'warn', 'medium', 'cảnh báo'].some(x => s.includes(x))) return 'warning';
  return 'info';
}
function timeAgo(iso) {
  if (!iso) return '';
  const s = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (s < 60) return 'vừa xong';
  if (s < 3600) return `${Math.floor(s / 60)} phút trước`;
  if (s < 86400) return `${Math.floor(s / 3600)} giờ trước`;
  return new Date(iso).toLocaleString('vi-VN');
}
function toast(title, body) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = `<b>${esc(title)}</b>${esc(body)}`;
  $('toast-zone').appendChild(t);
  setTimeout(() => t.remove(), 6000);
}

// ── Dropdown toggling ─────────────────────────────────────────────────────────
function closeDropdowns(except) {
  if (except !== 'bell') $('bell-dropdown').hidden = true;
  if (except !== 'user') $('user-dropdown').hidden = true;
}
$('bell-btn').onclick = (e) => { e.stopPropagation(); const d = $('bell-dropdown'); const show = d.hidden; closeDropdowns('bell'); d.hidden = !show; };
$('user-btn').onclick = (e) => { e.stopPropagation(); const d = $('user-dropdown'); const show = d.hidden; closeDropdowns('user'); d.hidden = !show; renderSettings(); };
document.addEventListener('click', (e) => {
  if (!e.target.closest('.dropdown') && !e.target.closest('.icon-btn')) closeDropdowns();
});

// ── Danh sách realtime từ FCM (foreground onMessage + background từ service worker) ──
let liveItems = [];
const liveSeen = new Set();
try {
  liveItems = JSON.parse(localStorage.getItem('liveItems') || '[]');
  liveItems.forEach(n => n._mid && liveSeen.add(n._mid));
} catch {}

function persist() { localStorage.setItem('liveItems', JSON.stringify(liveItems)); }

function handleIncoming(payload) {
  const note = payload.notification || {};
  const meta = payload.data || {};
  const mid  = payload.messageId || payload.fcmMessageId || `${Date.now()}-${Math.random()}`;
  if (liveSeen.has(mid)) return;
  liveSeen.add(mid);
  const sevRaw = meta.severity;
  liveItems.unshift({
    _mid: mid,
    title: note.title || meta.title || 'Thông báo',
    body:  note.body  || meta.body  || '',
    type: (meta.type || '').toLowerCase(),
    sevRaw,
    severity: normSev(sevRaw),
    deviceId: meta.deviceId || '',
    createdAt: new Date().toISOString(),
    isRead: false,
  });
  liveItems = liveItems.slice(0, 100);
  persist();
  toast(note.title || meta.title || 'Thông báo', note.body || meta.body || '');
  renderAll(true);
}

function unreadCount() { return liveItems.filter(n => !n.isRead).length; }

function markReadLive(mid) {
  const n = liveItems.find(x => x._mid === mid);
  if (n && !n.isRead) {
    n.isRead = true; persist(); renderAll();
    if (n._id && ready()) api(`/${n._id}/read`, { method: 'PATCH' }).catch(() => {});   // đồng bộ server
  }
}
function markAllReadLive() {
  liveItems.forEach(n => n.isRead = true); persist(); renderAll();
  if (ready()) api('/read-all', { method: 'PATCH' }).catch(() => {});                    // đồng bộ server
}

// ── Lịch sử bền vững từ REST (GET /api/v1/notifications?deviceId=...) ────────────
// Chữ ký nội dung + phút để chống trùng giữa item realtime (FCM) và item từ DB
// (cùng 1 tin có _mid khác _id nên không dedup được theo id).
function sigOf(n) {
  const bucket = Math.floor(new Date(n.createdAt).getTime() / 60000);
  return `${n.deviceId}|${n.title}|${n.body}|${bucket}`;
}
function itemFromServer(d) {
  return {
    _mid: 'srv-' + d._id,
    _id: d._id,
    title: d.title || 'Thông báo',
    body:  d.body || '',
    type: (d.type || '').toLowerCase(),
    sevRaw: d.severity,
    severity: normSev(d.severity),
    deviceId: d.deviceId || '',
    createdAt: d.createdAt || new Date().toISOString(),
    isRead: !!d.isRead,
  };
}
async function loadHistory() {
  if (!ready()) return renderAll();
  try {
    const res = await api('?limit=50');
    const seen = new Set(liveItems.map(sigOf));
    for (const s of (res.items || []).map(itemFromServer)) {
      const sg = sigOf(s);
      if (seen.has(sg)) {
        // đã hiển thị (bản realtime) → gắn _id để mark-read đồng bộ được
        const ex = liveItems.find(x => sigOf(x) === sg);
        if (ex && !ex._id) ex._id = s._id;
      } else {
        seen.add(sg); liveItems.push(s); liveSeen.add(s._mid);
      }
    }
    liveItems.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
    liveItems = liveItems.slice(0, 100);
    persist(); renderAll();
  } catch (e) {
    console.warn('loadHistory:', e.message);   // sai API key / server lỗi → giữ nguyên danh sách realtime
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderAll(isNew) {
  const rdy = ready();
  renderHero(isNew, rdy);
  renderRecent(rdy);
  renderDropdownList(rdy);
  const c = rdy ? unreadCount() : 0;
  $('unread-badge').hidden = c === 0;
  $('unread-badge').textContent = c > 99 ? '99+' : c;
}

function renderHero(isNew, rdy) {
  const hero = $('hero');
  if (!rdy) {
    hero.className = 'empty-hero';
    hero.innerHTML = `<div class="head" style="justify-content:center"><div>
      <div class="h-title">Chưa cấu hình</div>
      <div class="h-body">Bấm ⚙️ (góc phải) để nhập Server, Device ID và API key.</div></div></div>`;
    return;
  }
  const n = liveItems[0];
  if (!n) {
    hero.className = 'empty-hero';
    hero.innerHTML = `<div class="head" style="justify-content:center"><div>
      <div class="h-title">Chưa có thông báo</div>
      <div class="h-body">Thông báo mới sẽ hiện ở đây theo thời gian thực.</div></div></div>`;
    return;
  }
  hero.className = `sev-${n.severity}` + (isNew ? ' flash' : '');
  const bits = [];
  if (n.sevRaw != null) bits.push(`<span class="sev-badge" style="background:${SEV_COLOR[n.severity]}">${esc(SEV_LABEL[n.severity])}</span>`);
  if (n.deviceId) bits.push(`<span>${esc(n.deviceId)}</span>`);
  bits.push(`<span>${timeAgo(n.createdAt)}</span>`);
  hero.innerHTML = `
    <div class="head">
      <div class="h-icon">${TYPE_ICON[n.type] || '🔔'}</div>
      <div style="flex:1;min-width:0">
        <div class="h-title">${esc(n.title)}</div>
        ${n.body ? `<div class="h-body">${esc(n.body)}</div>` : ''}
        <div class="h-meta">${bits.join('')}</div>
      </div>
    </div>`;
  if (isNew) setTimeout(() => hero.classList.remove('flash'), 600);
}

// Dựng 1 thẻ thông báo (dùng chung cho dropdown + 2 tin nhỏ dưới hero)
function notiEl(n) {
  const el = document.createElement('div');
  el.className = `noti sev-${n.severity}${n.isRead ? '' : ' unread'}`;
  el.innerHTML = `
    <div class="icon">${TYPE_ICON[n.type] || '🔔'}</div>
    <div class="content">
      <div class="title"><span>${esc(n.title)}</span>${n.isRead ? '' : '<span class="dot"></span>'}</div>
      ${n.body ? `<div class="body">${esc(n.body)}</div>` : ''}
      <div class="meta">${n.deviceId ? esc(n.deviceId) + ' · ' : ''}${timeAgo(n.createdAt)}</div>
    </div>`;
  el.onclick = () => markReadLive(n._mid);
  return el;
}

function renderDropdownList(rdy) {
  const list = $('dropdown-list');
  if (!rdy) {
    list.innerHTML = '<div class="empty">Chưa cấu hình.<br>Bấm ⚙️ để nhập Server, Device ID và API key.</div>';
    return;
  }
  if (!liveItems.length) {
    list.innerHTML = '<div class="empty">Chưa có thông báo nào.<br>Khi hệ thống phát cảnh báo, nó sẽ hiện ở đây.</div>';
    return;
  }
  list.innerHTML = '';
  liveItems.forEach(n => list.appendChild(notiEl(n)));
}

// 2 tin nhỏ ngay bên dưới hero (tin gần đây thứ 2 và 3)
function renderRecent(rdy) {
  const box = $('recent-mini');
  box.innerHTML = '';
  if (!rdy) return;
  liveItems.slice(1, 3).forEach(n => box.appendChild(notiEl(n)));
}

// ── Cấu hình kiosk: form Server / Device ID / API key ─────────────────────────
function renderSettings() {
  const body = $('user-body');
  body.innerHTML = `
    ${ready() ? `<div class="user-tag">📟 ${esc(cfg.deviceId)}</div>` : ''}
    <label>Notification Service URL</label>
    <input id="cfg-server" value="${esc(cfg.server || 'http://localhost:3001')}" />
    <label>Device ID (cây/thiết bị màn hình này đứng cạnh)</label>
    <input id="cfg-device" value="${esc(cfg.deviceId || '')}" placeholder="VD: ESP32S3_Zone1" />
    <label>API key (x-api-key)</label>
    <input id="cfg-apikey" type="password" value="${esc(cfg.apiKey || '')}" placeholder="INTERNAL_API_KEY" />
    <button class="btn" id="btn-save">Lưu cấu hình</button>
    <button class="btn ghost" id="btn-push">🔔 Bật nhận push</button>
    <div class="fcm-state" id="fcm-state">Push: ${Notification.permission === 'granted' ? 'quyền đã cấp' : 'chưa bật'}</div>`;
  $('btn-save').onclick = () => saveSettings();
  $('btn-push').onclick = () => enablePush();
}

function updateUserLabel() {
  $('user-label').textContent = cfg.deviceId ? cfg.deviceId : 'Cấu hình';
}

function saveSettings() {
  const server   = ($('cfg-server').value || 'http://localhost:3001').replace(/\/$/, '');
  const deviceId = $('cfg-device').value.trim();
  const apiKey   = $('cfg-apikey').value;
  if (!deviceId || !apiKey) return toast('Thiếu thông tin', 'Cần nhập Device ID và API key.');

  const deviceChanged = cfg.deviceId && cfg.deviceId !== deviceId;
  cfg.server = server; cfg.deviceId = deviceId; cfg.apiKey = apiKey;
  localStorage.setItem('notiweb-config', JSON.stringify(cfg));

  if (deviceChanged) {   // đổi cây → xóa danh sách cũ để không lẫn tin của cây khác
    liveItems = []; liveSeen.clear(); persist();
  }
  updateUserLabel(); renderSettings(); renderAll();
  loadHistory();
  toast('Đã lưu', `Device: ${deviceId}`);
  if (Notification.permission === 'granted') enablePush(true);
}

// ── Push (FCM) ────────────────────────────────────────────────────────────────
async function enablePush(silent = false) {
  if (!ready()) return toast('Chưa cấu hình', 'Nhập Server, Device ID và API key trước.');
  try {
    const permission = await Notification.requestPermission();
    if (permission !== 'granted') return toast('Bị từ chối', 'Browser không cho phép hiện thông báo.');
    if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    messaging = firebase.messaging();
    const swReg = await navigator.serviceWorker.register('/firebase-messaging-sw.js');
    const token = await messaging.getToken({ vapidKey: VAPID_KEY, serviceWorkerRegistration: swReg });
    // Đăng ký token KÈM deviceId → service chỉ đẩy tin của cây này về màn hình này.
    const r = await fetch(`${serverUrl()}/internal/push/token`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': cfg.apiKey || '' },
      body: JSON.stringify({ token, deviceId: cfg.deviceId, device: 'web' }),
    });
    if (!r.ok) { const j = await r.json().catch(() => ({})); throw new Error(j.message || `HTTP ${r.status}`); }
    messaging.onMessage(payload => handleIncoming(payload));
    const st = $('fcm-state'); if (st) { st.textContent = 'Push: đang bật'; st.className = 'fcm-state on'; }
    if (!silent) toast('Sẵn sàng 🔔', 'Đã đăng ký nhận cảnh báo.');
  } catch (e) { toast('Lỗi bật push', e.message); }
}

// ── Boot ──────────────────────────────────────────────────────────────────────
if (ready()) {
  loadHistory();   // nạp lịch sử bền vững từ server khi mở lại trang
  if (Notification.permission === 'granted') enablePush(true);
}

// Nhận message từ service worker (khi tab ở chế độ nền)
if (navigator.serviceWorker) {
  navigator.serviceWorker.addEventListener('message', e => {
    if (e.data && e.data.type === 'fcm') handleIncoming(e.data.payload);
  });
}

updateUserLabel();
renderAll();
</script>
</body>
</html>
